<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task List</title>
    <link rel="stylesheet" href="output.css" />

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="font-mono bg-blue-200">
    <div class="max-w-7xl h-full p-[30px] relative z-0 mx-auto">
      <div class="flex items-center justify-between">
        <p class="text-[40px] font-[700]">Task List</p>
        <div>
          <button
            class="bg-purple-900 text-white font-[700] px-[30px] py-[10px] rounded-[10px]"
            id="show-form"
          >
            Add Task
          </button>
        </div>
      </div>
      <table class="w-full mt-10 border-separate border-spacing-y-4">
        <thead class="text-blue-500 text-[20px] font-[800]">
          <tr class="h-[80px]">
            <td
              class="px-12 max-w-[70px] bg-white rounded-tl-[15px] rounded-bl-[15px] font-[700]"
            >
              Task
            </td>
            <td class="bg-white font-[700]">Priority</td>
            <td class="bg-white font-[700]">Status</td>
            <td
              class="bg-white text-yellow-600 rounded-tr-[15px] rounded-br-[15px] font-[700]"
            >
              Action
            </td>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- ADD TASK FORM -->
    <div id="addForm" class="hidden">
      <form
        action="#"
        class="bg-white w-[600px] p-[30px] flex flex-col gap-[30px] rounded-[15px]"
        id="add-task"
      >
        <div class="flex justify-between items-center">
          <p class="text-[30px] font-[700]">Add Task</p>
          <button type="button" id="close-form">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div>
          <div>
            <label class="font-[600] text-[20px]" for="task">Task</label>
          </div>
          <input
            class="w-[70%] border-blue-500 border-2 rounded-[10px] px-[10px] py-[5px]"
            type="text"
            placeholder="Web Homework"
            id="task"
          />
        </div>
        <div>
          <label class="font-[600] text-[20px]" for="priority">Priority</label>
          <div class="flex gap-[20px]">
            <label class="cursor-pointer flex" for="high">
              <input
                class="peer peer/high hidden"
                type="radio"
                id="high"
                name="priority"
                value="high"
              />
              <span
                class="peer-checked/high:text-white peer-checked/high:bg-red-500 hover:bg-red-500 hover:text-white border-red-500 rounded-[15px] text-red-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >High</span
              >
            </label>

            <label class="cursor-pointer flex" for="medium">
              <input
                class="peer peer/medium hidden"
                type="radio"
                id="medium"
                name="priority"
                value="medium"
              />
              <span
                class="peer-checked/medium:text-white peer-checked/medium:bg-yellow-500 hover:bg-yellow-500 hover:text-white border-yellow-500 rounded-[15px] text-yellow-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >Medium</span
              >
            </label>

            <label class="cursor-pointer flex" for="low">
              <input
                class="peer peer/low hidden"
                type="radio"
                id="low"
                name="priority"
                value="low"
              />
              <span
                class="peer-checked/low:text-white peer-checked/low:bg-green-500 hover:bg-green-500 hover:text-white border-green-500 rounded-[15px] text-green-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >Low</span
              >
            </label>
          </div>
        </div>

        <div>
          <label class="font-[600] text-[20px]" for="priority">Status</label>
          <div class="flex gap-[20px]">
            <label class="cursor-pointer flex" for="todo">
              <input
                class="peer peer/todo hidden"
                type="radio"
                id="todo"
                name="status"
                value="todo"
              />
              <span
                class="peer-checked/todo:text-white peer-checked/todo:bg-blue-500 hover:bg-blue-500 hover:text-white border-blue-500 rounded-[15px] text-blue-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >To Do</span
              >
            </label>

            <label class="cursor-pointer flex" for="progress">
              <input
                class="peer peer/progress hidden"
                type="radio"
                id="progress"
                name="status"
                value="progress"
              />
              <span
                class="peer-checked/progress:text-white peer-checked/progress:bg-blue-500 hover:bg-blue-500 hover:text-white border-blue-500 rounded-[15px] text-blue-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >Progress</span
              >
            </label>

            <label class="cursor-pointer flex" for="done">
              <input
                class="peer peer/done hidden"
                type="radio"
                id="done"
                name="status"
                value="done"
              />
              <span
                class="peer-checked/done:text-white peer-checked/done:bg-blue-500 hover:bg-blue-500 hover:text-white border-blue-500 rounded-[15px] text-blue-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >Done</span
              >
            </label>
          </div>
        </div>
        <div class="self-end">
          <button
            type="submit"
            class="bg-purple-900 text-white font-[700] px-[60px] py-[10px] rounded-[10px]"
          >
            Add
          </button>
        </div>
      </form>
    </div>

    <!-- DELETE TASK -->
    <div id="delete" class="hidden">
      <div
        class="bg-white w-[600px] p-[30px] flex flex-col gap-[30px] rounded-[15px]"
      >
        <div class="flex flex-col justify-center items-center gap-[40px]">
          <p class="text-[30px] font-[700] text-red-500">Are you sure?</p>
          <i
            class="fas fa-exclamation-triangle text-[50px] font-[700] text-red-500"
          ></i>
          <div class="flex gap-[20px]">
            <button
              id="yes-button"
              class="bg-red-500 text-white font-[700] px-[30px] py-[10px] rounded-[10px]"
            >
              Yes
            </button>
            <button
              id="no-button"
              class="bg-blue-500 text-white font-[700] px-[30px] py-[10px] rounded-[10px]"
            >
              No
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- UPDATE TASK -->
    <div id="update-task">
      <form
        action="#"
        class="bg-white w-[600px] p-[30px] flex flex-col gap-[30px] rounded-[15px]"
        id="add-task"
      >
        <div class="flex justify-between items-center">
          <p class="text-[30px] font-[700]">Update Task</p>
          <button type="button" id="close-form">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div>
          <div>
            <label class="font-[600] text-[20px]" for="update-task">Task</label>
          </div>
          <input
            class="w-[70%] border-blue-500 border-2 rounded-[10px] px-[10px] py-[5px]"
            type="text"
            placeholder="Web Homework"
            id="task"
          />
        </div>
        <div>
          <label class="font-[600] text-[20px]" for="priority">Priority</label>
          <div class="flex gap-[20px]">
            <label class="cursor-pointer flex" for="high">
              <input
                class="peer peer/high hidden"
                type="radio"
                id="high"
                name="priority"
                value="high"
              />
              <span
                class="peer-checked/high:text-white peer-checked/high:bg-red-500 hover:bg-red-500 hover:text-white border-red-500 rounded-[15px] text-red-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >High</span
              >
            </label>

            <label class="cursor-pointer flex" for="medium">
              <input
                class="peer peer/medium hidden"
                type="radio"
                id="medium"
                name="priority"
                value="medium"
              />
              <span
                class="peer-checked/medium:text-white peer-checked/medium:bg-yellow-500 hover:bg-yellow-500 hover:text-white border-yellow-500 rounded-[15px] text-yellow-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >Medium</span
              >
            </label>

            <label class="cursor-pointer flex" for="low">
              <input
                class="peer peer/low hidden"
                type="radio"
                id="low"
                name="priority"
                value="low"
              />
              <span
                class="peer-checked/low:text-white peer-checked/low:bg-green-500 hover:bg-green-500 hover:text-white border-green-500 rounded-[15px] text-green-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >Low</span
              >
            </label>
          </div>
        </div>

        <div>
          <label class="font-[600] text-[20px]" for="priority">Status</label>
          <div class="flex gap-[20px]">
            <label class="cursor-pointer flex" for="todo">
              <input
                class="peer peer/todo hidden"
                type="radio"
                id="todo"
                name="status"
                value="todo"
              />
              <span
                class="peer-checked/todo:text-white peer-checked/todo:bg-blue-500 hover:bg-blue-500 hover:text-white border-blue-500 rounded-[15px] text-blue-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >To Do</span
              >
            </label>

            <label class="cursor-pointer flex" for="progress">
              <input
                class="peer peer/progress hidden"
                type="radio"
                id="progress"
                name="status"
                value="progress"
              />
              <span
                class="peer-checked/progress:text-white peer-checked/progress:bg-blue-500 hover:bg-blue-500 hover:text-white border-blue-500 rounded-[15px] text-blue-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >Progress</span
              >
            </label>

            <label class="cursor-pointer flex" for="done">
              <input
                class="peer peer/done hidden"
                type="radio"
                id="done"
                name="status"
                value="done"
              />
              <span
                class="peer-checked/done:text-white peer-checked/done:bg-blue-500 hover:bg-blue-500 hover:text-white border-blue-500 rounded-[15px] text-blue-500 font-[700] border-2 w-[90px] h-[35px] flex items-center justify-center"
                >Done</span
              >
            </label>
          </div>
        </div>
        <div class="self-end">
          <button
            id="update-cancel"
            type="button"
            class="bg-red-500 text-white font-[700] px-[60px] py-[10px] rounded-[10px]"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="bg-purple-900 text-white font-[700] px-[60px] py-[10px] rounded-[10px]"
          >
            Update
          </button>
        </div>
      </form>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
